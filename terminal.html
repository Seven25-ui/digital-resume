<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Terminal | Seven33.site</title>
    <style>
        body {
            background-color: #0d1117;
            color: #7ee787;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #30363d;
            padding: 20px;
            background: #161b22;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(126, 231, 135, 0.2);
        }
        .input-line {
            display: flex;
            margin-top: 10px;
            align-items: center;
        }
        .prompt { color: #58a6ff; margin-right: 10px; font-weight: bold; }
        input {
            background: transparent;
            border: none;
            color: #7ee787;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
        }
        .output { margin-bottom: 8px; white-space: pre-wrap; line-height: 1.4; }
        .command { color: #d2a8ff; }
        .error { color: #f85149; }
        .header-text { color: #f2cc60; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        
        /* Custom scrollbar para Matrix look */
        #terminal::-webkit-scrollbar { width: 8px; }
        #terminal::-webkit-scrollbar-track { background: #0d1117; }
        #terminal::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
    </style>
</head>
<body>

<div id="terminal">
    <div class="header-text">SEVEN33_OS v2.0.1 (AUTHORIZED ACCESS ONLY)</div>
    <div class="output">Welcome, Architect **Seven**...</div>
    <div class="output">Type <span class="command">'help'</span> to initialize command list.</div>
    <div id="history"></div>
    <div class="input-line">
        <span class="prompt">seven@matrix:~$</span>
        <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<script>
    const input = document.getElementById('command-input');
    const history = document.getElementById('history');
    const terminal = document.getElementById('terminal');

    const commands = {
        'help': "Available commands: \n- **about**: Who is Architect Seven?\n- **chapters**: Access Automation Hub (30 Chapters)\n- **ls**: List directory content\n- **whoami**: Current session identity\n- **status**: Check system integrity\n- **date**: Current Matrix timestamp\n- **clear**: Purge terminal history\n- **exit**: Terminate session and return home",
        'about': "Architect Seven is a lead system specialist optimizing the Matrix through Termux, Python, and advanced Bash automation.",
        'chapters': "Redirecting to SEVEN33_AUTOMATION_HUB...",
        'date': () => new Date().toString(),
        'clear': () => { history.innerHTML = ''; return ''; },
        'ls': "index.html  automation-hub.html  terminal.html  seven33_core/  logs/  vault/  scripts/",
        'whoami': "User: Seven (The Architect)\nRole: Root Administrator\nHost: seven33.site\nLocation: Inside the Matrix",
        'status': "System: ONLINE\nEncryption: 256-bit AES\nFirewall: ACTIVE\nUptime: 100% - Matrix Stable.",
        'socials': "Secure Nodes:\n- GitHub: github.com/seven33\n- Home: https://seven33.site",
        'seven': "Seven is the number of perfection. Architect Seven is the master of code."
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.toLowerCase().trim();
            
            // Add input line to history
            const line = document.createElement('div');
            line.innerHTML = `<span class="prompt">seven@matrix:~$</span> <span class="command">${cmd}</span>`;
            history.appendChild(line);

            // Special logic for commands
            if (cmd === 'chapters') {
                setTimeout(() => window.location.href = 'automation-hub.html', 1500);
            } else if (cmd === 'exit') {
                window.location.href = 'index.html';
            }

            // Generate output
            const output = document.createElement('div');
            output.className = 'output';

            if (commands[cmd]) {
                const result = typeof commands[cmd] === 'function' ? commands[cmd]() : commands[cmd];
                output.innerText = result;
            } else if (cmd !== '') {
                output.innerHTML = `<span class="error">Unknown Command: ${cmd}. Type 'help' for options.</span>`;
            }

            if (cmd !== 'clear') {
                history.appendChild(output);
            }
            
            input.value = '';
            terminal.scrollTop = terminal.scrollHeight;
        }
    });

    // Keep focus on input
    document.addEventListener('click', () => input.focus());
</script>

</body>
</html>
