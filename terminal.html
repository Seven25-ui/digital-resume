<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Terminal | seven33.site</title>
    <style>
        body {
            background-color: #0d1117;
            color: #7ee787;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #30363d;
            padding: 20px;
            background: #161b22;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(126, 231, 135, 0.1);
        }
        .input-line {
            display: flex;
            margin-top: 10px;
        }
        .prompt { color: #58a6ff; margin-right: 10px; }
        input {
            background: transparent;
            border: none;
            color: #7ee787;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
        }
        .output { margin-bottom: 5px; white-space: pre-wrap; }
        .command { color: #d2a8ff; }
        .error { color: #f85149; }
    </style>
</head>
<body>

<div id="terminal">
    <div class="output">Welcome to **Matrix_OS v2.0**...</div>
    <div class="output">Type <span class="command">'help'</span> to see available commands.</div>
    <div id="history"></div>
    <div class="input-line">
        <span class="prompt">loy@matrix:~$</span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>
</div>

<script>
    const input = document.getElementById('command-input');
    const history = document.getElementById('history');
    const terminal = document.getElementById('terminal');

    const commands = {
        'help': "Available commands: \n- **about**: Who is Loy?\n- **chapters**: View all 30 tutorial chapters\n- **clear**: Clear the terminal\n- **date**: Show current Matrix time\n- **exit**: Return to Home",
        'about': "Loy is a System Architect mastering the Matrix through Termux and Automation.",
        'chapters': "Redirecting to Automation Hub in 2 seconds...",
        'date': () => new Date().toString(),
        'clear': () => { history.innerHTML = ''; return ''; }
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.toLowerCase().trim();
            const line = document.createElement('div');
            line.innerHTML = `<span class="prompt">loy@matrix:~$</span> <span class="command">${cmd}</span>`;
            history.appendChild(line);

            if (cmd === 'chapters') {
                setTimeout(() => window.location.href = 'automation-hub.html', 2000);
            } else if (cmd === 'exit') {
                window.location.href = 'index.html';
            }

            const output = document.createElement('div');
            output.className = 'output';

            if (commands[cmd]) {
                const result = typeof commands[cmd] === 'function' ? commands[cmd]() : commands[cmd];
                output.innerText = result;
            } else if (cmd !== '') {
                output.innerHTML = `<span class="error">Command not found: ${cmd}</span>`;
            }

            history.appendChild(output);
            input.value = '';
            terminal.scrollTop = terminal.scrollHeight;
        }
    });
</script>

</body>
</html>
