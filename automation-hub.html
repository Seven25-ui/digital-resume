<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Hub | Matrix Digital</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
            margin-bottom: 40px;
            text-align: center;
        }
        h1 { color: #7ee787; font-family: 'Courier New', monospace; }
        .hub-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .topic-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .topic-card:hover {
            transform: translateY(-5px);
            border-color: #7ee787;
            background: #1c2128;
        }
        .tag {
            background: #238636;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>[ AUTOMATION_HUB ]</h1>
        <p>Optimizing the Matrix through code and logic.</p>
    </div>

    <div class="hub-grid">
        <a href="chap21.html" class="topic-card">
            <span class="tag">Active</span>
            <h2 style="color: #58a6ff; margin: 10px 0;">Chapter 21: Bash Scripting Essentials</h2>
            <p>Automate repetitive Linux tasks, directory backups, and system maintenance using pure Shell scripts.</p>
            <span style="color: #7ee787; font-weight: bold;">Launch Chapter →</span>
        </a>

        <script>
            // Data for Chapters 22-30
            const activeChapters = [
                { ch: 22, title: "Python for System Admin", desc: "Using Python to monitor system logs and send automated alerts." },
                { ch: 23, title: "Automated Network Audits", desc: "Scripting Nmap and network tools for security scanning." },
                { ch: 24, title: "Cron Job Mastery", desc: "Scheduling advanced system tasks with precision timing." },
                { ch: 25, title: "Database Automation", desc: "Automated SQL backups and optimization scripts." },
                { ch: 26, title: "API Integration in Termux", desc: "Connecting scripts to external web services and bots." },
                { ch: 27, title: "Log Rotation & Management", desc: "Automating the cleaning and archiving of system logs." },
                { ch: 28, title: "Automated Security Patching", desc: "Creating scripts to keep the Matrix environment up-to-date." },
                { ch: 29, title: "DevOps Pipeline Basics", desc: "Building a mini-CI/CD flow inside a mobile environment." },
                { ch: 30, title: "The Architect's Conclusion", desc: "Final Roadmap: A summary of technical mastery and future scaling." }
            ];

            // Render active chapters
            activeChapters.forEach(item => {
                document.write(`
                    <a href="chap${item.ch}.html" class="topic-card">
                        <span class="tag">Active</span>
                        <h2 style="color: #58a6ff; margin: 10px 0;">Chapter ${item.ch}: ${item.title}</h2>
                        <p style="font-size: 0.9rem; color: #8b949e;">${item.desc}</p>
                        <span style="color: #7ee787; font-weight: bold;">Launch Chapter →</span>
                    </a>
                `);
            });
        </script>
    </div>

    <a href="index.html" class="btn-back">← Back to System Portfolio</a>
</div>

</body>
</html>
